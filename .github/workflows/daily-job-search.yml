name: Daily Job Search

on:
  schedule:
    # Runs once per day in the morning European time.
    # GitHub cron uses UTC, so this is 07:30 CET / 08:30 CEST.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r job-agent-trainee-scout/requirements.txt

      - name: Run daily job scout
        env:
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python job-agent-trainee-scout/src/main.py

      - name: Commit new job results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job-agent-trainee-scout/jobs/*.csv job-agent-trainee-scout/jobs/*.md job-agent-trainee-scout/jobs/*.json job-agent-trainee-scout/data/seen_jobs.json
          if git diff --cached --quiet; then
            echo "No new job results to commit."
          else
            git commit -m "Add daily job scout results"
            git push
          fi
